services:
  app:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-twap_prod}_parser_app
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV:-prod}
      STAGE: ${STAGE:-OFF}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-twaps.ru}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://twaps.ru}
      PUBLIC_SIGNAL_WS_URL: ${PUBLIC_SIGNAL_WS_URL:-wss://twaps.ru/ws/signals}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./sessions:/app/sessions
    restart: unless-stopped
    command: ["python", "-m", "app.cli", "listen"]

  signal-server:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-twap_prod}_signal_server
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV:-prod}
      STAGE: ${STAGE:-OFF}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-twaps.ru}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://twaps.ru}
      PUBLIC_SIGNAL_WS_URL: ${PUBLIC_SIGNAL_WS_URL:-wss://twaps.ru/ws/signals}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${SIGNAL_SERVER_PORT:-8090}:8090"
    restart: unless-stopped
    command: ["python", "-m", "app.cli", "signal-server", "--host", "0.0.0.0", "--port", "8090"]
    profiles: ["server"]

  local:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-twap_prod}_local_client
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV:-prod}
      STAGE: ${STAGE:-OFF}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-twaps.ru}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://twaps.ru}
      PUBLIC_SIGNAL_WS_URL: ${PUBLIC_SIGNAL_WS_URL:-wss://twaps.ru/ws/signals}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${LOCAL_UI_PORT:-8080}:8080"
    volumes:
      - ./local_data:/app/local_data
    restart: unless-stopped
    command: ["python", "-m", "app.cli", "local", "--host", "0.0.0.0", "--port", "8080"]
    profiles: ["local"]

  mysql:
    image: mysql:8.4
    container_name: ${COMPOSE_PROJECT_NAME:-twap_prod}_mysql
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ${COMPOSE_PROJECT_NAME:-twap_prod}_phpmyadmin
    env_file: .env
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 128M
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:

